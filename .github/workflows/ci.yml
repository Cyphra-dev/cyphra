name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/*' run build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Audit (high+)
        run: pnpm audit --audit-level=high

      - name: Test
        run: pnpm test

      - name: Example app (smoke)
        run: pnpm example:basic

      - name: Build docs
        run: pnpm doc:build

  neo4j-integration:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/cyphra_ci_test
        options: >-
          --health-cmd "cypher-shell -u neo4j -p cyphra_ci_test 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-start-period 60s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/*' run build

      - name: Runtime integration (Neo4j)
        env:
          NEO4J_TEST_URI: bolt://127.0.0.1:7687
          NEO4J_TEST_USER: neo4j
          NEO4J_TEST_PASSWORD: cyphra_ci_test
        run: pnpm --filter @cyphra/runtime exec vitest run src/client.integration.test.ts
