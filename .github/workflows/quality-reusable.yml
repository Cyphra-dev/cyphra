# Shared install → build → lint → test → smoke checks (CI + pre-release).
name: Quality

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/*' run build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Audit (high+)
        run: pnpm audit --audit-level=high

      - name: Test
        run: pnpm test

      - name: Example app (smoke)
        run: pnpm example:basic

      - name: Build docs
        run: pnpm doc:build

      - name: Package VS Code extension (smoke)
        run: pnpm --filter cyphra-vscode run package
